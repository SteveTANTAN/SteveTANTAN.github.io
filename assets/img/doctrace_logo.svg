<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">DocTrace Logo</title>
  <desc id="desc">A long-document reasoning logo with a traced document, hypergraph memory nodes, and an on-demand search path.</desc>
  <defs>
    <linearGradient id="doc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111e"/>
      <stop offset="0.36" stop-color="#10233f"/>
      <stop offset="0.66" stop-color="#0d465c"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <radialGradient id="doc-spot" cx="52%" cy="48%" r="54%">
      <stop offset="0" stop-color="#f8fbff" stop-opacity="0.94"/>
      <stop offset="0.18" stop-color="#7dd3fc" stop-opacity="0.58"/>
      <stop offset="0.48" stop-color="#fbbf24" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#07111e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheet" x1="480" y1="188" x2="1012" y2="814" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.56" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="fold" x1="900" y1="180" x2="1060" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="trace" x1="370" y1="760" x2="1134" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.38" stop-color="#ffffff"/>
      <stop offset="0.72" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <pattern id="doc-grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0v72" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1.5"/>
    </pattern>
    <filter id="doc-glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.25 0 0 0 0 0.76 0 0 0 0 1 0 0 0 0.72 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="doc-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#001020" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1536" height="1024" fill="url(#doc-bg)"/>
  <rect width="1536" height="1024" fill="url(#doc-grid)"/>
  <ellipse cx="780" cy="510" rx="570" ry="355" fill="url(#doc-spot)"/>

  <g opacity="0.5" stroke="#e0f2fe" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M216 298 384 398 546 304 704 410" fill="none"/>
    <path d="M1322 306 1140 416 980 332 830 440" fill="none"/>
    <path d="M204 742 382 640 548 732 706 612" fill="none"/>
    <path d="M1328 744 1144 638 978 732 828 614" fill="none"/>
  </g>

  <g filter="url(#doc-shadow)">
    <path d="M512 176h366l160 160v494c0 48-39 87-87 87H512c-48 0-87-39-87-87V263c0-48 39-87 87-87Z" fill="#071b2b" stroke="#e8f7ff" stroke-width="14"/>
    <path d="M536 214h330l132 132v462c0 35-28 63-63 63H536c-35 0-63-28-63-63V277c0-35 28-63 63-63Z" fill="url(#sheet)"/>
    <path d="M866 214v104c0 29 23 52 52 52h80Z" fill="url(#fold)" stroke="#0b2a3e" stroke-width="8" stroke-linejoin="round"/>
    <path d="M564 405h332M564 494h246M564 583h330M564 672h210" stroke="#164e63" stroke-width="24" stroke-linecap="round" opacity="0.32"/>
  </g>

  <g filter="url(#doc-glow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M348 738C484 590 580 612 672 528c100-92 112-210 286-224 86-7 164 17 248 84" stroke="url(#trace)" stroke-width="46"/>
    <path d="M348 738C484 590 580 612 672 528c100-92 112-210 286-224 86-7 164 17 248 84" stroke="#ffffff" stroke-width="14" opacity="0.58"/>
  </g>

  <g filter="url(#doc-shadow)">
    <circle cx="348" cy="738" r="58" fill="url(#node)" stroke="#071b2b" stroke-width="10"/>
    <circle cx="672" cy="528" r="64" fill="url(#node)" stroke="#071b2b" stroke-width="10"/>
    <circle cx="958" cy="304" r="58" fill="url(#node)" stroke="#071b2b" stroke-width="10"/>
    <circle cx="1206" cy="388" r="58" fill="url(#node)" stroke="#071b2b" stroke-width="10"/>
    <circle cx="752" cy="718" r="92" fill="#f8fbff" stroke="#071b2b" stroke-width="12"/>
    <circle cx="752" cy="718" r="48" fill="none" stroke="#0ea5e9" stroke-width="18"/>
    <path d="M790 756l76 76" stroke="#0f172a" stroke-width="24" stroke-linecap="round"/>
    <path d="M794 760l70 70" stroke="#f59e0b" stroke-width="12" stroke-linecap="round"/>
  </g>

  <g opacity="0.86" stroke="#0f172a" stroke-width="7" stroke-linecap="round">
    <path d="M332 716h34"/>
    <path d="M656 506h34"/>
    <path d="M942 282h34"/>
    <path d="M1190 366h34"/>
  </g>
  <g opacity="0.4" fill="#ffffff">
    <circle cx="326" cy="714" r="22"/>
    <circle cx="642" cy="504" r="24"/>
    <circle cx="938" cy="282" r="22"/>
    <circle cx="1184" cy="366" r="22"/>
  </g>
</svg>
